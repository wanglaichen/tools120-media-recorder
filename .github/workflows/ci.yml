name: CI/CD

# 仅在推送语义化版本 Tag（v1.2.3）时触发，避免每次 push main / PR 都跑完整构建
on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

env:
  NODE_VERSION: '20.18.0'
  NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
  NEXT_PUBLIC_UPLOAD_ENDPOINT: ${{ vars.NEXT_PUBLIC_UPLOAD_ENDPOINT }}
  # git = 打 Tag 后推 main 触发 EdgeOne 自动构建（GitHub 关联项目）
  # upload = CLI 上传 dist（须用「直接上传」创建的项目）
  EDGEONE_DEPLOY_MODE: ${{ vars.EDGEONE_DEPLOY_MODE || 'git' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            node_modules
            client/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install

      - name: Build client
        run: bash scripts/ci-github-build.sh

      - name: Verify build output
        run: |
          test -f ./client/out/index.html
          node scripts/verify-static-export.mjs ./client/out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to EdgeOne
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    environment:
      name: production
      url: https://${{ vars.EDGEONE_PROJECT_NAME || 'tools120-media-recorder' }}.edgeone.page

    steps:
      - name: Checkout main
        if: env.EDGEONE_DEPLOY_MODE == 'git'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Download dist
        if: env.EDGEONE_DEPLOY_MODE == 'upload'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy dist via EdgeOne CLI
        if: env.EDGEONE_DEPLOY_MODE == 'upload'
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
          EDGEONE_PROJECT_NAME: ${{ vars.EDGEONE_UPLOAD_PROJECT_NAME }}
        run: |
          if [ -z "$EDGEONE_API_TOKEN" ]; then
            echo "请配置 EDGEONE_API_TOKEN，并创建「直接上传」类型项目"
            exit 1
          fi
          if [ -z "$EDGEONE_PROJECT_NAME" ]; then
            echo "请配置仓库变量 EDGEONE_UPLOAD_PROJECT_NAME（直接上传项目的名称）"
            exit 1
          fi
          test -f ./dist/index.html
          echo "CLI 上传到: $EDGEONE_PROJECT_NAME"
          npx edgeone@latest pages deploy ./dist -n "$EDGEONE_PROJECT_NAME" -t "$EDGEONE_API_TOKEN" -e production

      - name: Trigger EdgeOne Git deploy
        if: env.EDGEONE_DEPLOY_MODE == 'git'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "ci: trigger EdgeOne deploy for ${{ github.ref_name }}"
          git push origin HEAD:main
          echo "已推送 main，EdgeOne 将自动拉取仓库并构建（请确认生产分支为 main）"

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
